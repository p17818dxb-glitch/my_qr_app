name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev uuid-dev lzma-dev liblzma-dev

      - name: Install Pinned Builder Tools
        run: |
          pip install --upgrade pip
          pip install "cython<3.0.0" buildozer setuptools

      - name: Compile App APK
        run: |
          export APP_ANDROID_ARCHS="arm64-v8a"
          buildozer android debug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: MobileApp-APK
          path: bin/*.apk
